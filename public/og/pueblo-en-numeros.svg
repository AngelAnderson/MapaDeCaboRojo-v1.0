<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Kicker -->
  <text x="80" y="120" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="700" fill="#5eead4" letter-spacing="3">📊 CABO ROJO EN NÚMEROS</text>

  <!-- Main headline (wraps to 2 lines) -->
  <text x="80" y="225" font-family="-apple-system, system-ui, sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-1">1 negocio por cada</text>
  <text x="80" y="320" font-family="-apple-system, system-ui, sans-serif" font-size="78" font-weight="800" fill="#5eead4" letter-spacing="-1">50 personas.</text>

  <!-- Math line -->
  <rect x="80" y="365" width="640" height="56" rx="8" fill="rgba(255,255,255,0.08)"/>
  <text x="100" y="402" font-family="ui-monospace, 'SF Mono', monospace" font-size="22" fill="#94a3b8">47,158 personas ÷ 937 negocios = 1 cada 50</text>

  <!-- Subhead -->
  <text x="80" y="475" font-family="-apple-system, system-ui, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">El promedio en Puerto Rico: 1 cada ~90.</text>
  <text x="80" y="510" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" font-style="italic">TAM/SAM/SOM por categoría · sobreoferta visible · errores admitidos.</text>

  <!-- Footer URL -->
  <text x="80" y="585" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="600" fill="#5eead4">mapadecaborojo.com/pueblo-en-numeros</text>

  <!-- Right-side big number accent -->
  <text x="1140" y="380" font-family="-apple-system, system-ui, sans-serif" font-size="280" font-weight="900" fill="rgba(94,234,212,0.08)" text-anchor="end" letter-spacing="-8">50</text>
</svg>
